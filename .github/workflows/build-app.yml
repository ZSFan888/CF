name: Build App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Build-And-Pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          validate-wrappers: false

      - name: Build Debug APK
        run: gradle assembleDebug assembleDebugAndroidTest --stacktrace

      - name: Run emulator smoke test and capture adb logs
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          emulator-boot-timeout: 900
          disable-animations: true
          script: |
            mkdir -p artifacts

            # Show gradle/java environment
            command -v gradle || echo "gradle not found in PATH"
            gradle --version || echo "gradle --version failed"
            java -version || echo "java not found"

            adb wait-for-device
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true
            adb logcat -c
            adb logcat -v threadtime > artifacts/adb-logcat.txt &
            LOGCAT_PID=$!
            TEST_EXIT=0

            # Install test app explicitly
            gradle installDebug installDebugAndroidTest --stacktrace || echo "gradle install failed"

            # Run connected tests
            gradle connectedDebugAndroidTest --stacktrace || TEST_EXIT=$?

            adb shell dumpsys activity activities > artifacts/activity-dump.txt || true
            adb shell dumpsys package com.zsfan.cfapp > artifacts/package-dump.txt || true
            adb shell pidof com.zsfan.cfapp > artifacts/app-pid.txt || true

            kill $LOGCAT_PID || true
            wait $LOGCAT_PID || true
            exit $TEST_EXIT

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload android test APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-androidTest
          path: app/build/outputs/apk/androidTest/debug/*.apk

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-test-reports
          path: |
            app/build/reports/androidTests/connected/**
            app/build/outputs/androidTest-results/connected/**
            artifacts/**
