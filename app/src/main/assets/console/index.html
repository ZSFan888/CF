<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CFApp Console</title>
<style>
:root{--bg:#f5f5f3;--surface:#fbfbfa;--line:rgba(0,0,0,.1);--text:#151515;--muted:#60605a;--accent:#111}
[data-theme=dark]{--bg:#0f1011;--surface:#17181a;--line:rgba(255,255,255,.1);--text:#efefec;--muted:#a7a7a1;--accent:#f2f2ef}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
.wrap{padding:20px;display:grid;gap:16px}.card{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:16px}.btn{border:1px solid var(--line);background:var(--accent);color:var(--bg);border-radius:999px;padding:10px 14px}.btn.secondary{background:transparent;color:var(--text)}
small,.muted{color:var(--muted)}.row{display:flex;justify-content:space-between;gap:12px;align-items:center}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.list{display:grid;gap:10px;margin-top:12px}.item{padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.02);text-align:left}[data-theme=dark] .item{background:rgba(255,255,255,.03)}
.select,.input,.textarea{width:100%;margin-top:12px;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:var(--surface);color:var(--text)}.textarea{min-height:88px;resize:vertical}.pre{white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.5;border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:12px;background:rgba(0,0,0,.02)}[data-theme=dark] .pre{background:rgba(255,255,255,.03)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin:0 0 8px">CFApp</h1>
      <small>Android shell for Cloudflare client</small>
    </div>
    <div class="card">
      <div class="row"><span>连接状态</span><strong id="connected">未连接</strong></div>
      <div class="row" style="margin-top:10px"><span>Token status</span><span id="tokenStatus" class="muted">unknown</span></div>
      <div class="row" style="margin-top:10px"><span>Account</span><span id="accountName" class="muted">none</span></div>
      <div class="row" style="margin-top:10px"><span>Account ID</span><span id="accountId" class="mono muted">-</span></div>
      <div class="actions">
        <button class="btn" onclick="window.CFBridge?.requestTheme()">Sync theme</button>
        <button class="btn secondary" onclick="window.CFBridge?.openConnect()">Reconnect</button>
      </div>
    </div>
    <div class="card">
      <div class="row"><span>Pages Projects</span><strong id="projectCount">0</strong></div>
      <div id="projects" class="list"></div>
    </div>
    <div class="card">
      <div class="row"><span>Deployments</span><strong id="deploymentCount">0</strong></div>
      <div id="deployments" class="list"></div>
      <div class="pre" id="deploymentLogs">选择一个 deployment 查看日志</div>
    </div>
    <div class="card">
      <div class="row"><span>Zones</span><strong id="zoneCount">0</strong></div>
      <select id="zoneSelect" class="select" onchange="window.CFBridge?.selectZone(this.value)"></select>
      <div id="zones" class="list"></div>
    </div>
    <div class="card">
      <div class="row"><span>DNS Records</span><strong id="recordCount">0</strong></div>
      <div id="records" class="list"></div>
      <div class="pre" id="recordDetail">选择一条记录查看详情</div>
    </div>
    <div class="card">
      <div class="row"><span>DNS Form</span><strong id="dnsFormMode">Create</strong></div>
      <select id="dnsType" class="select">
        <option>A</option><option>AAAA</option><option>CNAME</option><option>TXT</option>
      </select>
      <input id="dnsSearch" class="input" placeholder="搜索 DNS 记录" oninput="window.CFApp.onDnsSearch(this.value)">
      <input id="dnsTypeChip" class="input" placeholder="类型筛选：A / AAAA / CNAME / TXT" oninput="window.CFApp.onDnsType(this.value)">
      <input id="dnsName" class="input" placeholder="Name，例如 blog 或 @">
      <textarea id="dnsContent" class="textarea" placeholder="Content，例如 IP、目标域名或 TXT 文本"></textarea>
      <input id="dnsTtl" class="input" type="number" min="1" value="1" placeholder="TTL，1 表示 Auto">
      <label class="muted" style="display:flex;gap:8px;align-items:center;margin-top:12px"><input id="dnsProxied" type="checkbox"> Proxied（仅 A / AAAA / CNAME）</label>
      <div class="actions">
        <button class="btn" onclick="window.CFApp.submitCreateRecord()">Add record</button>
        <button class="btn secondary" onclick="window.CFApp.loadSelectedIntoForm()">Load selected</button>
        <button class="btn secondary" onclick="window.CFApp.submitUpdateRecord()">Save edit</button>
        <button class="btn secondary" onclick="window.CFApp.deleteSelectedRecord()">Delete record</button>
      </div>
      <div class="pre" id="dnsFormHint">支持 A / AAAA / CNAME / TXT。TTL 为 1 时表示 Auto。</div>
    </div>
    <div class="card">
      <div class="row"><select id="analyticsTimeSelect" class="select" style="margin-right:8px" onchange="window.CFBridge?.setAnalyticsTimeRange(this.value)"><option value="7">7 天</option><option value="14">14 天</option><option value="30">30 天</option></select><span>Analytics</span><strong id="analyticsCount">0</strong></div>
      <div id="analyticsBars" class="list"></div>
      <div id="analytics" class="list" style="margin-top:12px"></div>
    </div>
  </div>
<script>
window.__selectedRecord = null;
window.CFApp = {
  setTheme(theme){ document.documentElement.setAttribute('data-theme', theme); },
  setSession(session){
    document.getElementById('connected').textContent = session.connected ? '已连接' : '未连接';
    document.getElementById('tokenStatus').textContent = session.tokenStatus || 'unknown';
    document.getElementById('accountName').textContent = session.accountName || 'none';
    document.getElementById('accountId').textContent = session.accountId || '-';
  },
  setPages(payload){
    const projects = payload.projects || [];
    const deployments = payload.deployments || [];
    document.getElementById('projectCount').textContent = String(projects.length);
    document.getElementById('deploymentCount').textContent = String(deployments.length);
    document.getElementById('projects').innerHTML = projects.map(p => `<button class="item" onclick="window.CFBridge?.selectProject('${String(p.name||'').replace(/'/g, "\'")}')"><div><strong>${p.name||'-'}</strong></div><div class="muted">${p.subdomain||'-'}</div><div class="muted">branch: ${p.production_branch||'-'}</div></button>`).join('') || '<div class="item muted">暂无项目</div>';
    document.getElementById('deployments').innerHTML = deployments.map(d => `<button class="item" onclick="window.CFBridge?.selectDeployment('${String(d.id||'').replace(/'/g, "\'")}')"><div class="row"><strong>${d.environment||'-'}</strong><span class="muted">${d.status||'-'}</span></div><div class="mono muted">${d.url||'-'}</div><div class="muted">${d.createdOn||'-'}</div></button>`).join('') || '<div class="item muted">暂无部署</div>';
    document.getElementById('deploymentLogs').textContent = payload.deploymentLogs || '选择一个 deployment 查看日志';
  },
  setDns(payload){
    const zones = payload.zones || [];
    const records = payload.records || [];
    window.__selectedRecord = payload.selectedRecord || null;
    document.getElementById('zoneCount').textContent = String(zones.length);
    document.getElementById('recordCount').textContent = String(records.length);
    const select = document.getElementById('zoneSelect');
    select.innerHTML = zones.map(z => `<option value="${z.id}">${z.name||'-'}</option>`).join('') || '<option value="">No zones</option>';
    if (payload.selectedZoneId) select.value = payload.selectedZoneId;
    document.getElementById('zones').innerHTML = zones.map(z => `<div class="item"><div><strong>${z.name||'-'}</strong></div><div class="muted">${z.status||'-'}</div><div class="mono muted">${z.id||'-'}</div></div>`).join('') || '<div class="item muted">暂无 Zone</div>';
    document.getElementById('records').innerHTML = records.map(r => `<button class="item" onclick="window.CFBridge?.selectRecord('${String(r.id||'').replace(/'/g, "\'")}')"><div class="row"><strong>${r.name||'-'}</strong><span class="muted">${r.type||'-'}</span></div><div class="muted">${r.content||'-'}</div><div class="row"><span class="muted">TTL ${r.ttl ?? '-'}</span><span class="muted">${r.proxied ? 'Proxied' : 'DNS only'}</span></div></button>`).join('') || '<div class="item muted">暂无记录</div>';
    const detail = payload.selectedRecord;
    document.getElementById('recordDetail').textContent = detail ? `ID: ${detail.id || '-'}
Name: ${detail.name || '-'}
Type: ${detail.type || '-'}
Content: ${detail.content || '-'}
TTL: ${detail.ttl ?? '-'}
Proxy: ${detail.proxied ? 'Proxied' : 'DNS only'}` : '选择一条记录查看详情';
    document.getElementById('dnsFormHint').textContent = payload.error || '支持 A / AAAA / CNAME / TXT。A 需 IPv4，AAAA 需 IPv6，CNAME 应填主机名。TTL 为 1 时表示 Auto。';
  },
  setAnalytics(payload){
    const points = payload.points || [];
    document.getElementById('analyticsCount').textContent = String(points.length);
    document.getElementById('analyticsBars').innerHTML = payload.bars || '<div class="item muted">暂无 analytics 数据</div>';
    document.getElementById('analytics').innerHTML = points.map(p => `<div class="item"><div class="row"><strong>${p.date||'-'}</strong><span class="muted">${p.requests} req</span></div><div class="row"><span class="muted">bytes ${p.bytes}</span><span class="muted">cached ${p.cachedRequests}</span></div><div class="row"><span class="muted">threats ${p.threats}</span></div></div>`).join('') || `<div class="item muted">${payload.error || '暂无 analytics 数据'}</div>`;
  },
  onDnsSearch(value){
    window.CFBridge?.setDnsSearchQuery(value);
  },
  loadSelectedIntoForm(){
    const r = window.__selectedRecord;
    if(!r){ document.getElementById('dnsFormHint').textContent = '先选择一条记录'; return; }
    document.getElementById('dnsFormMode').textContent = 'Edit';
    document.getElementById('dnsType').value = r.type || 'A';
    document.getElementById('dnsName').value = r.name || '';
    document.getElementById('dnsContent').value = r.content || '';
    document.getElementById('dnsTtl').value = r.ttl || 1;
    document.getElementById('dnsProxied').checked = !!r.proxied;
    document.getElementById('dnsFormHint').textContent = '已载入当前选中记录，可直接保存修改。';
  },
  collectForm(){
    const type = document.getElementById('dnsType').value;
    const payload = {
      type,
      name: document.getElementById('dnsName').value.trim(),
      content: document.getElementById('dnsContent').value.trim(),
      ttl: Number(document.getElementById('dnsTtl').value || 1),
    };
    if(['A','AAAA','CNAME'].includes(type)) payload.proxied = document.getElementById('dnsProxied').checked;
    return payload;
  },
  submitCreateRecord(){
    document.getElementById('dnsFormMode').textContent = 'Create';
    const payload = window.CFApp.collectForm();
    window.CFBridge?.createDnsRecord(JSON.stringify(payload));
  },
  submitUpdateRecord(){
    const r = window.__selectedRecord;
    if(!r || !r.id){ document.getElementById('dnsFormHint').textContent = '先选择一条记录再编辑。'; return; }
    document.getElementById('dnsFormMode').textContent = 'Edit';
    const payload = window.CFApp.collectForm();
    window.CFBridge?.updateDnsRecord(String(r.id), JSON.stringify(payload));
  }
};
</script>
</body>
</html>
