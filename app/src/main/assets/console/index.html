<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CFApp Console</title>
<style>
:root{--bg:#f5f5f3;--surface:#fbfbfa;--line:rgba(0,0,0,.1);--text:#151515;--muted:#60605a;--accent:#111}
[data-theme=dark]{--bg:#0f1011;--surface:#17181a;--line:rgba(255,255,255,.1);--text:#efefec;--muted:#a7a7a1;--accent:#f2f2ef}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
.wrap{padding:20px;display:grid;gap:16px}.card{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:16px}.btn{border:1px solid var(--line);background:var(--accent);color:var(--bg);border-radius:999px;padding:10px 14px}
small{color:var(--muted)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin:0 0 8px">CFApp</h1>
      <small>Android WebView shell for Cloudflare client</small>
    </div>
    <div class="card">
      <div>Token status: <span id="tokenStatus">not connected</span></div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="window.CFBridge?.requestTheme()">Sync theme</button>
        <button class="btn" onclick="window.CFBridge?.pickFile()">Pick file</button>
      </div>
    </div>
  </div>
<script>
window.CFApp = {
  setTheme(theme){ document.documentElement.setAttribute('data-theme', theme); },
  setTokenStatus(text){ document.getElementById('tokenStatus').textContent = text; }
};
</script>
</body>
</html>
